services:
  - type: web
    name: nanobana-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Your Ollama Cloud API key
      - key: OPENAI_BASE_URL
        sync: false  # Ollama Cloud: https://ollama.com/v1 (verify in your dashboard)
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: glm-4.7
      - key: CHROMA_API_KEY
        sync: false  # ChromaDB Cloud API key
      - key: CHROMA_TENANT
        sync: false  # ChromaDB Cloud tenant ID
      - key: CHROMA_DATABASE
        sync: false  # ChromaDB Cloud database name
      - key: TAVILY_API_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CORS_ORIGINS
        value: https://nanoui-snsk.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: WATCHLIST_TICKERS
        value: AAPL,MSFT,TSLA,NVDA,GOOG,AMZN
      - key: INGESTION_CONCURRENCY
        value: "3"
      - key: DATABASE_URL
        fromDatabase:
          name: nanobana-db
          property: connectionString
      - key: REDIS_URL
        sync: false  # Create Redis manually in Render dashboard, paste connection string here

databases:
  - name: nanobana-db
    plan: basic-256mb
    databaseName: nanobana
    user: nanobana
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []

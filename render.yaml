services:
  - type: web
    name: nanobana-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Your Ollama Cloud API key
      - key: OPENAI_BASE_URL
        value: https://api.ollama.com/v1
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: glm-4.7
      - key: TAVILY_API_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CORS_ORIGINS
        value: https://nanobana.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: WATCHLIST_TICKERS
        value: AAPL,MSFT,TSLA,NVDA,GOOG,AMZN
      - key: INGESTION_CONCURRENCY
        value: "3"
      - key: DATABASE_URL
        fromDatabase:
          name: nanobana-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nanobana-redis
          type: redis
          property: connectionString

databases:
  - name: nanobana-db
    plan: starter
    databaseName: nanobana
    user: nanobana
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
    initialDatabases:
      - name: nanobana

  - name: nanobana-redis
    plan: starter
    region: oregon
    type: redis
    maxmemoryPolicy: allkeys-lru

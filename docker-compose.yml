services:
  postgres:
    image: postgres:16-alpine
    container_name: nanobana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nanobana
      POSTGRES_USER: nanobana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nanobana_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanobana"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nanobana-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanobana-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: postgresql://nanobana:${POSTGRES_PASSWORD:-nanobana_dev}@postgres:5432/nanobana
      REDIS_URL: redis://redis:6379/0
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  chroma_data:
